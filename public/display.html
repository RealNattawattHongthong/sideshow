<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Display — Sideshow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #050508;
  color: #f0f0f8;
  min-height: 100vh;
  width: 100vw;
  overflow-x: hidden;
}

#canvas {
  width: 500px;
  min-height: 100vh;
  background: #0a0a12;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.disp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.disp-header-left { display: flex; align-items: center; gap: 12px; }
.disp-logo-icon { width: 24px; height: 24px; color: #00e676; flex-shrink: 0; }
.disp-show-title {
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: #8888a8;
}
.disp-onair {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  color: #ff5252; padding: 4px 10px;
  border: 1px solid rgba(255,82,82,0.3); border-radius: 99px;
  background: rgba(255,82,82,0.08);
  animation: onair-blink 1.5s ease-in-out infinite;
}
@keyframes onair-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── List ── */
.disp-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.disp-empty { padding: 60px 28px; font-size: 15px; color: #555570; text-align: center; }

/* ── Row ── */
.disp-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 28px;
  border-left: 3px solid transparent;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.disp-row:last-child { border-bottom: none; }

.dr-past    { opacity: 0.22; }
.dr-next    { border-left-color: rgba(255,171,0,0.4); background: rgba(255,171,0,0.05); }
.dr-current { border-left-color: #00e676; background: rgba(0,230,118,0.04); }
.dr-blink   { animation: row-blink 1.2s ease-in-out infinite; }
@keyframes row-blink {
  0%,100%{ background: rgba(0,230,118,0.04); }
  50%    { background: rgba(0,230,118,0.10); }
}

/* ── Row left ── */
.dr-left {
  width: 26px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding-top: 3px;
}
.dr-num { font-family: monospace; font-size: 12px; color: #555570; }
.dr-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #00e676; box-shadow: 0 0 7px rgba(0,230,118,0.5);
}
.dr-dot-blink { animation: dot-pulse 1.2s ease-in-out infinite; }
@keyframes dot-pulse {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:0.3; transform:scale(0.7); }
}

/* ── Row content ── */
.dr-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.dr-title { font-size: 17px; font-weight: 600; color: #f0f0f8; line-height: 1.25; }
.dr-past .dr-title { color: #555570; }
.dr-sub { font-size: 12px; color: #8888a8; }
.dr-presenter {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: #8888a8; margin-top: 1px;
}
.dr-presenter svg { width: 11px; height: 11px; opacity: 0.5; flex-shrink: 0; }

/* ── Speakers ── */
.dr-speakers { display: flex; align-items: center; gap: 8px; margin-top: 7px; flex-wrap: wrap; }
.dr-speaker  { display: flex; align-items: center; gap: 6px; }
.dr-speaker-photo {
  width: 30px; height: 30px; border-radius: 50%; overflow: hidden;
  background: #161628; border: 1.5px solid rgba(255,255,255,0.10);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.dr-speaker-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.dr-speaker-photo svg { width: 17px; height: 17px; color: #555570; }
.dr-speaker-name { font-size: 12px; font-weight: 500; color: #8888a8; }

/* ── Row right ── */
.dr-right { flex-shrink: 0; padding-top: 2px; }
.dr-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  padding: 3px 7px; border-radius: 4px;
}
.dr-badge-now  { color: #00e676; border: 1px solid rgba(0,230,118,0.25); background: rgba(0,230,118,0.08); }
.dr-badge-next { color: #ffab00; border: 1px solid rgba(255,171,0,0.3); background: rgba(255,171,0,0.07); }

/* ── Footer ── */
.disp-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
.disp-conn { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; }
.disp-conn-dot { width: 7px; height: 7px; border-radius: 50%; }
.conn-ok { color: #00e676; }
.conn-ok .disp-conn-dot { background: #00e676; box-shadow: 0 0 6px rgba(0,230,118,0.5); }
.conn-err { color: #555570; }
.conn-err .disp-conn-dot { background: #555570; }
.disp-powered { font-size: 10px; color: #555570; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div id="canvas">
  <div class="disp-header">
    <div class="disp-header-left">
      <svg class="disp-logo-icon" viewBox="0 0 20 20" fill="none">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
        <rect x="12" y="1" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
        <rect x="1" y="12" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
        <rect x="12" y="12" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
      </svg>
      <span class="disp-show-title">SESSION SCHEDULE</span>
    </div>
    <div id="header-right"></div>
  </div>
  <div class="disp-list" id="list"><div class="disp-empty">Connecting…</div></div>
  <div class="disp-footer">
    <div class="disp-conn conn-err" id="conn-status">
      <span class="disp-conn-dot"></span>
      <span id="conn-label">Disconnected</span>
    </div>
    <div class="disp-powered">Sideshow · OnTime</div>
  </div>
</div>

<script>
const params  = new URLSearchParams(location.search)
const HOST    = params.get('host') || '82.26.104.52'
const PORT    = params.get('port') || '4001'
const ADMIN_KEY = 'sideshow_admin'

let rundown      = []
let runtimeState = null
let connected    = false
let admin        = { blink: false, speakers: [] }

// ── Admin sync from localStorage ─────────────────────────────
function syncAdmin() {
  try {
    const raw = localStorage.getItem(ADMIN_KEY)
    const next = raw ? JSON.parse(raw) : { blink: false, speakers: [] }
    if (JSON.stringify(next) !== JSON.stringify(admin)) {
      admin = next
      render()
    }
  } catch {}
}

// ── Fetch rundown ─────────────────────────────────────────────
async function fetchRundown() {
  try {
    const res = await fetch(`http://${HOST}:${PORT}/data/rundowns/current`)
    if (!res.ok) return
    const data = await res.json()
    rundown = (data.flatOrder || []).map(id => data.entries?.[id]).filter(Boolean)
    render()
  } catch {}
}

// ── WebSocket ─────────────────────────────────────────────────
function connect() {
  let ws
  try { ws = new WebSocket(`ws://${HOST}:${PORT}/ws`) } catch { retry(); return }

  ws.onopen = () => {
    connected = true
    render()
    fetchRundown()
  }
  ws.onclose = () => { connected = false; runtimeState = null; render(); retry() }
  ws.onerror = () => { connected = false; render() }
  ws.onmessage = ev => {
    try {
      const msg = JSON.parse(ev.data)
      if (msg.tag === 'runtime-data') {
        runtimeState = runtimeState ? { ...runtimeState, ...msg.payload } : msg.payload
        render()
      }
    } catch {}
  }
}

function retry() { setTimeout(connect, 3000) }

// ── Render ────────────────────────────────────────────────────
function render() {
  const events         = rundown.filter(e => e.type === 'event')
  const selectedId     = runtimeState?.eventNow?.id  ?? null
  const nextId         = runtimeState?.eventNext?.id ?? null
  const currentIdx     = events.findIndex(e => e.id === selectedId)
  const isOnAir        = runtimeState?.onAir
  const blink          = admin.blink
  const speakers       = admin.speakers || []

  // Header right
  document.getElementById('header-right').innerHTML =
    isOnAir ? '<span class="disp-onair">● LIVE</span>' : ''

  // Connection status
  const connEl = document.getElementById('conn-status')
  connEl.className = 'disp-conn ' + (connected ? 'conn-ok' : 'conn-err')
  document.getElementById('conn-label').textContent = connected ? 'Live' : 'Disconnected'

  // List
  const listEl = document.getElementById('list')
  if (events.length === 0) {
    listEl.innerHTML = `<div class="disp-empty">${connected ? 'No events loaded' : 'Connecting to OnTime…'}</div>`
    return
  }

  let html = ''
  events.forEach((ev, idx) => {
    const isCurrent    = ev.id === selectedId
    const isNext       = ev.id === nextId
    const isPast       = currentIdx > -1 && idx < currentIdx
    const rowSpeakers  = speakers.filter(s => s.sessionId === ev.id && (s.name || s.image))

    let cls = 'disp-row'
    if      (isCurrent) cls += blink ? ' dr-current dr-blink' : ' dr-current'
    else if (isNext)    cls += ' dr-next'
    else if (isPast)    cls += ' dr-past'

    const dotHtml = isCurrent
      ? `<span class="dr-dot${blink ? ' dr-dot-blink' : ''}"></span>`
      : `<span class="dr-num">${idx + 1}</span>`

    let content = `<div class="dr-title">${esc(ev.title || '—')}</div>`
    if (ev.subtitle)  content += `<div class="dr-sub">${esc(ev.subtitle)}</div>`
    if (ev.presenter) content += `<div class="dr-presenter">
      <svg viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="4" r="2"/><path d="M1 11c0-2.761 2.239-5 5-5s5 2.239 5 5"/></svg>
      ${esc(ev.presenter)}</div>`

    if (rowSpeakers.length > 0) {
      content += '<div class="dr-speakers">'
      rowSpeakers.forEach(s => {
        const photo = s.image
          ? `<img src="${s.image}" alt="${esc(s.name || 'Speaker')}">`
          : `<svg viewBox="0 0 32 32" fill="currentColor"><circle cx="16" cy="11" r="6"/><path d="M4 28c0-6.627 5.373-12 12-12s12 5.373 12 12"/></svg>`
        content += `<div class="dr-speaker">
          <div class="dr-speaker-photo">${photo}</div>
          ${s.name ? `<span class="dr-speaker-name">${esc(s.name)}</span>` : ''}
        </div>`
      })
      content += '</div>'
    }

    const badge = isCurrent
      ? '<span class="dr-badge dr-badge-now">NOW</span>'
      : isNext ? '<span class="dr-badge dr-badge-next">NEXT</span>' : ''

    html += `<div class="${cls}" id="r-${ev.id}">
      <div class="dr-left">${dotHtml}</div>
      <div class="dr-content">${content}</div>
      <div class="dr-right">${badge}</div>
    </div>`
  })

  listEl.innerHTML = html

  if (selectedId) {
    document.getElementById('r-' + selectedId)
      ?.scrollIntoView({ behavior: 'smooth', block: 'center' })
  }
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Boot ──────────────────────────────────────────────────────
connect()
setInterval(syncAdmin, 500)
syncAdmin()
</script>
</body>
</html>
